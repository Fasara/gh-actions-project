name: Runs checks on the project
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6 
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: echo "Running linter..."

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      